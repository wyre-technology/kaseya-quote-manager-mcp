# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: Your Kaseya Quote Manager API key (Settings → API)
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { KASEYA_QUOTE_MANAGER_API_KEY: config.apiKey, MCP_TRANSPORT: 'stdio' } })
